<ion-header>
  <ion-toolbar>
    <ion-title>Inventory Management</ion-title>
  </ion-toolbar>
</ion-header>

<ion-tabs>
  <ion-tab-bar slot="bottom">
    <ion-tab-button tab="inventory-list">
      <ion-icon name="list-outline"></ion-icon>
      <ion-label>Inventory</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="add-featured">
      <ion-icon name="add-circle-outline"></ion-icon>
      <ion-label>Add/Featured</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="edit-delete">
      <ion-icon name="create-outline"></ion-icon>
      <ion-label>Edit/Delete</ion-label>
    </ion-tab-button>

    <ion-tab-button tab="privacy-security">
      <ion-icon name="shield-outline"></ion-icon>
      <ion-label>Privacy</ion-label>
    </ion-tab-button>
  </ion-tab-bar>
</ion-tabs>
